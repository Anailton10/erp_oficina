<table class="table table-dark table-striped align-middle">
  <thead>
    <tr>
      <th>Item</th>
      <th>Qtd</th>
      <th>Preço Unit.</th>
      <th>Total</th>
    </tr>
  </thead>

  <tbody>
    {% for item in order.items.all %}
      <tr>
        <td>
          {{ item.product.name }}<br />
          <small class="text-white">{{ item.product.type }}</small>
        </td>
        <td>{{ item.quantity }}</td>
        <td>R$ {{ item.unit_price }}</td>
        <td>R$ {{ item.total_price }}</td>
      </tr>
    {% empty %}
      <tr>
        <td colspan="4" class="text-center">Nenhum item adicionado</td>
      </tr>
    {% endfor %}
  </tbody>
</table>

<!-- Atualiza o total via HTMX -->
<div hx-swap-oob="true" id="order-total">
  Total: R$ {{ order.total|floatformat:2 }}
</div>
