<table class="table table-dark table-striped align-middle">
  <thead>
    <tr>
      <th>Item</th>
      <th>Qtd</th>
      <th>Preço Unit.</th>
      <th>Total</th>
      <th>Ações</th>
    </tr>
  </thead>
  <tbody>
    {% for item in order.items.all %}
      <tr>
        <td>
          {{ item.product.name }}<br />
          <small class="text-white">{{ item.product.type }}</small>
        </td>
        <td>{{ item.quantity }}</td>
        <td>R$ {{ item.unit_price }}</td>
        <td>R$ {{ item.total_price }}</td>
        <td>
          <button class="btn btn-sm btn-warning"
                  hx-get="{% url 'orders:update_item' item.pk %}"
                  hx-target="#modal-container"
                  hx-swap="innerHTML">
            <i class="bi bi-pencil"></i>
          </button>
          <form class="d-inline" action="{% url 'orders:delete_item' item.pk %}" method="post">
            {% csrf_token %}
            <button class="btn btn-sm btn-danger"><i class="bi bi-trash"></i></button>
          </form>
        </td>
      </tr>
    {% empty %}
      <tr>
        <td colspan="5" class="text-center">Nenhum item adicionado</td>
      </tr>
    {% endfor %}
  </tbody>
</table>

<!-- OOB fora da tabela — HTML válido -->
<div id="order-total" hx-swap-oob="true">Total: R$ {{ order.total|floatformat:2 }}</div>
<div id="modal-container" hx-swap-oob="true"></div>
