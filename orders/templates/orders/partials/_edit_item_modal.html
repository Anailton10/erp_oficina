<div class="modal fade show" style="display:block;" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content bg-dark text-light">
      <div class="modal-header">
        <h5 class="modal-title">Editar Item</h5>
        <button type="button" class="btn-close btn-close-white" onclick="closeModal()"></button>
      </div>
      <div class="modal-body">
        <form 
          hx-post="{% url 'orders:update_item' item.id %}"
          hx-target="#order-items"
          hx-swap="outerHTML"
          hx-on="htmx:afterRequest: document.body.dispatchEvent(new Event('itemAdded'))"
        >
          {% csrf_token %}
          {% if form.non_field_errors %}
            <div class="alert alert-danger">{{ form.non_field_errors }}</div>
          {% endif %}
          <div class="mb-3">
            <label class="form-label">Quantidade</label>
            {{ form.quantity }}
            <div class="text-danger"><small>{{ form.quantity.errors }}</small></div>
          </div>
          <div class="mb-3">
            <label class="form-label">Preço Unitário</label>
            {{ form.unit_price }}
            <div class="text-danger"><small>{{ form.unit_price.errors }}</small></div>
          </div>
          <button type="submit" class="btn btn-success w-100">Salvar Alterações</button>
        </form>
      </div>
    </div>
  </div>
</div>
<div class="modal-backdrop fade show"></div>
