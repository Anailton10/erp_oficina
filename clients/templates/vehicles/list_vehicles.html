{% extends 'base.html' %}

{% block content %}
  <h2>Veículos</h2>

  <a href="#" class="btn btn-primary mb-3">Novo Veículo</a>

  <table class="table table-dark table-striped">
    <thead>
      <tr>
        <th>Cliente</th>
        <th>Modelo</th>
        <th>Marca</th>
        <th>Ações</th>
      </tr>
    </thead>

    <tbody>
      {% for vehicle in vehicles %}
        <tr>
          <td>{{ vehicle.client.name }}</td>
          <td>{{ vehicle.vehicle_model }}</td>
          <td>{{ vehicle.vehicle_brand }}</td>

          <td>
            <a href="#" class="btn btn-info btn-sm">Ver</a>
          </td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock %}
