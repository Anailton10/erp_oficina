{% if messages %}
  <div id="toast-container">
    {% for message in messages|slice:":1" %}
      <div class="toast-msg {{ message.tags }}">
        {{ message }}
      </div>
    {% endfor %}
  </div>

<style>
  #toast-container {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
  }

  .toast-msg {
    min-width: 250px;
    margin-bottom: 10px;
    padding: 12px 16px;
    border-radius: 6px;
    color: #fff;
    opacity: 0;
    transform: translateY(-20px);
    transition: all 0.4s ease;
  }

  .toast-msg.show {
    opacity: 1;
    transform: translateY(0);
  }

  .alert-success { background: #198754; }
  .alert-danger { background: #dc3545; }
  .alert-warning { background: #ffc107; color: #000; }
  .alert-info { background: #0dcaf0; color: #000; }
</style>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const toasts = document.querySelectorAll(".toast-msg");

      toasts.forEach((toast, index) => {
        setTimeout(() => {
          toast.classList.add("show");
        }, index * 100);

        setTimeout(() => {
          toast.classList.remove("show");
        }, 3000 + index * 100);
      });
    });
  </script>
{% endif %}
