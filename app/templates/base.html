<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>
      {% block title %}
        ERP Oficina
      {% endblock %}
    </title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <style>
      body {
        background: #1f1f1f;
        color: #e5e5e5;
      }
      .sidebar {
        width: 240px;
        height: 100vh;
        position: fixed;
        background: #161616;
        padding: 20px;
      }
      .sidebar a {
        display: block;
        color: #ccc;
        padding: 10px;
        text-decoration: none;
        border-radius: 6px;
      }
      .sidebar a:hover {
        background: #2c2c2c;
        color: white;
      }
      .content {
        margin-left: 260px;
        padding: 30px;
      }
    </style>
  </head>
  <body>
    <div class="sidebar">
      <a href="{% url 'home' %}"><h5 class="mb-4">ERP Oficina</h5></a>
      <a href="{% url 'clients:clients_list' %}"><i class="bi bi-people"></i> Clientes</a>
      <a href="{% url 'orders:order_list' %}"><i class="bi bi-car-front"></i> Ordem de Serviço</a>
      <a href="{% url 'products:list' %}"><i class="bi bi-box"></i> Catálogo</a>
    </div>
    <div class="content">
      {% include 'includes/_messages.html' %}

      {% block content %}
      {% endblock %}
    </div>
    <div id="modal-container"></div>
  </body>
</html>
