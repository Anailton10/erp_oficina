<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}ERP Oficina{% endblock %}</title>

    <!-- Bootstrap JS Bundle com Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body{
            background:#1f1f1f;
            color:#e5e5e5;
        }

        .sidebar{
            width:240px;
            height:100vh;
            position:fixed;
            background:#161616;
            padding:20px;
        }

        .sidebar a{
            display:block;
            color:#ccc;
            padding:10px;
            text-decoration:none;
            border-radius:6px;
        }

        .sidebar a:hover{
            background:#2c2c2c;
            color:white;
        }

        .content{
            margin-left:260px;
            padding:30px;
        }
    </style>
</head>

<body>

<div class="sidebar">

    <h5 class="mb-4">ERP Oficina</h5>

    <a href="{% url 'clients:list_clients' %}">
        <i class="bi bi-people"></i> Clientes
    </a>

    <a href="{% url 'clients:list_vehicles' %}">
        <i class="bi bi-car-front"></i> Veículos
    </a>

</div>


<div class="content">

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
