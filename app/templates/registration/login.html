<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #1f1f1f;
      color: #e5e5e5;
    }
  </style>
</head>

<body>

<div class="container-fluid vh-100 d-flex justify-content-center align-items-center">

  <div class="card bg-dark text-light shadow w-100" style="max-width: 400px;">
    <div class="card-body p-4">

      <h4 class="text-center mb-4">Acesso ao sistema</h4>

      <form method="post">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label small">Usuário</label>
          <input type="text" name="username" class="form-control bg-dark text-light border-secondary" required>
        </div>

        <div class="mb-3">
          <label class="form-label small">Senha</label>
          <input type="password" name="password" class="form-control bg-dark text-light border-secondary" required>
        </div>

        {% if form.errors %}
          <div class="text-danger small mb-3">
            Usuário ou senha inválidos
          </div>
        {% endif %}

        <button type="submit" class="btn btn-primary w-100">
          Entrar
        </button>

      </form>

    </div>
  </div>

</div>

</body>
</html>
