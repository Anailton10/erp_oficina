services:

  nginx:
    image: nginx
    restart: always
    ports:
      - 80:80
    depends_on:
        - erp_web
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
  erp_web:
      build: .
      env_file:
        - .env
      restart: always
      ports:
        - 8000:8000
      depends_on:
        - erp_db


  erp_db:
    image: postgres:15
    env_file:
      - .env
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}


volumes:

  postgres_data: